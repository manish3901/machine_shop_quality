{% extends "base.html" %}

{% block title %}Edit Cut Length - {{ section.section_number }}{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('master_data.list_customers') }}">Customers</a></li>
                    <li class="breadcrumb-item"><a
                            href="{{ url_for('master_data.manage_sections', customer_id=section.customer_id) }}">{{
                            section.customer.customer_name }}</a></li>
                    <li class="breadcrumb-item"><a
                            href="{{ url_for('master_data.manage_cut_lengths', section_id=section.id) }}">{{
                            section.section_number }}</a></li>
                    <li class="breadcrumb-item active">Edit Cut Length</li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-ruler-combined me-2"></i>
                        Edit Cut Length
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('master_data.edit_cut_length', cl_id=cl.id) }}" method="POST">
                        <div class="mb-4">
                            <label for="cut_length" class="form-label fw-bold">Cut Length (Numerical)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg" id="cut_length"
                                name="cut_length" value="{{ cl.cut_length }}" required>
                        </div>

                        <div class="mb-4">
                            <label for="status" class="form-label fw-bold">Status</label>
                            <select name="status" id="status" class="form-select form-select-lg">
                                <option value="Active" {{ 'selected' if cl.status=='Active' }}>Active</option>
                                <option value="Inactive" {{ 'selected' if cl.status=='Inactive' }}>Inactive</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-5">
                            <a href="{{ url_for('master_data.manage_cut_lengths', section_id=section.id) }}"
                                class="btn btn-outline-secondary px-4">
                                <i class="fas fa-arrow-left me-2"></i> Back
                            </a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
